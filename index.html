<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduQuest - Învață cu Pisiuc</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ECRAN LOGIN -->
    <div id="ecran-login" class="overlay-full">
        <div class="card-login">
            <h2>EduQuest Login</h2>
            <input type="text" placeholder="Utilizator">
            <input type="password" placeholder="Parolă">
            <button onclick="arataSelectieRol()">Intră în cont</button>
        </div>
    </div>

    <!-- ECRAN SELECȚIE ROL -->
    <div id="ecran-rol" class="overlay-full ascuns">
        <div class="card-selectie">
            <h1>Cine ești?</h1>
            <div class="optiuni">
                <div class="rol-box" onclick="setRol('elev')">Sunt Elev</div>
                <div class="rol-box" onclick="setRol('profesor')">Sunt Profesor</div>
            </div>
        </div>
    </div>

    <!-- INTERFAȚA PRINCIPALĂ -->
    <div id="interfata-principala" class="ascuns">
    <div id="app">
        <!-- Buton nou pentru întoarcere -->
        <button id="btn-acasa" onclick="resetInterfata()" style="position: fixed; top: 20px; left: 20px; z-index: 1002;">🏠 Acasă</button>
        
        <h1 id="titlu">EduQuest</h1>
            
            <div id="grid-principal"></div>

            <!-- QUIZ MATEMATICĂ -->
            <div id="quiz-container" class="ascuns">
    
    <p id="intrebare-text"></p>
    <div id="optiuni"></div>
</div>

            <!-- EXERCIȚIU VIZUAL ȘTIINȚE -->
            <div id="exercitiu-vizual-container" class="ascuns">
                <div class="game-layout">
                    <div id="labels-container">
                        <div class="draggable" draggable="true" data-part="radacina">Rădăcina</div>
                        <div class="draggable" draggable="true" data-part="tulpina">Tulpina</div>
                        <div class="draggable" draggable="true" data-part="frunza">Frunza</div>
                        <div class="draggable" draggable="true" data-part="floarea">Floarea</div>
                        <div class="draggable" draggable="true" data-part="fructul">Fructul</div>
                    </div>

                    <div id="image-wrapper">
                        <img src="Planta_Capsuna.jpg" alt="Capsuna">
                        <!-- Punctele de drop (Corectat comentariul aici) -->
                        <div class="drop-zone" style="top: 85%; left: 50%;" data-accept="radacina"></div>
                        <div class="drop-zone" style="top: 60%; left: 45%;" data-accept="tulpina"></div>
                        <div class="drop-zone" style="top: 55%; left: 30%;" data-accept="frunza"></div>
                        <div class="drop-zone" style="top: 25%; left: 40%;" data-accept="floarea"></div>
                        <div class="drop-zone" style="top: 40%; left: 65%;" data-accept="fructul"></div>
                    </div>
                </div>
            </div>

            <!-- MASCOTA PISIUC (Acum e sigur vizibilă) -->
            <div id="mascota-container">
                <div id="bula-text" class="ascuns"></div>
                <img id="cat-img" src="pisiuc_neutru.png" alt="Mascota Pisiuc">
            </div>

            <div id="status">🔥 Streak: <span id="streak">0</span></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
